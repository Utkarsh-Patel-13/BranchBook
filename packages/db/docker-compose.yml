name: branchbook

services:
  postgres:
    image: postgres
    container_name: branchbook-postgres
    environment:
      POSTGRES_DB: branchbook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - branchbook_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: branchbook-redis
    ports:
      - "6379:6379"
    volumes:
      - branchbook_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  branchbook_postgres_data:
  branchbook_redis_data:
