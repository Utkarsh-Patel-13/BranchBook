name: Publish Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/branchbook-server:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/branchbook-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # VITE_SERVER_URL is baked in at build time.
          # Set it as a repository variable (Settings → Variables) to match
          # your production backend URL, e.g. https://api.example.com
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL || '__VITE_SERVER_URL__' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/branchbook-web:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/branchbook-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
