name: Branch Policy

on: pull_request

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Block non-dev merges into main
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "development" ]]; then
            echo "Only development can merge into main"
            exit 1
          fi